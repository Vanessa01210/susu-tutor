<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酥酥老師國中小家教 | 入口網</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&display=swap');

        :root {
            --color-orange: #E28743;
            --color-milktea: #D4A373;
            --color-green: #A3B18A;
            --color-yellow: #E9C46A;
            --color-darkbrown: #582F0E;
            --bg-color: #FDFBF7; 
        }

        body {
            font-family: 'Noto Serif TC', "PMingLiU", "新細明體", serif; 
            background-color: var(--bg-color);
            color: var(--color-darkbrown);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 讓主視覺變成有質感的卡片設計 */
        .container {
            width: 100%;
            max-width: 500px;
            background-color: #ffffff;
            padding: 50px 30px;
            text-align: center;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(88, 47, 14, 0.08); /* 柔和的深焙棕陰影 */
            border-top: 8px solid var(--color-milktea); /* 頂部奶茶色裝飾線 */
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* 背景幾何裝飾元素 A (右上角暖陽黃圓形) */
        .container::before {
            content: '';
            position: absolute;
            top: -40px;
            right: -40px;
            width: 120px;
            height: 120px;
            background-color: var(--color-yellow);
            border-radius: 50%;
            opacity: 0.15;
            z-index: 0;
        }

        /* 背景幾何裝飾元素 B (左下角抹茶綠圓形) */
        .container::after {
            content: '';
            position: absolute;
            bottom: -30px;
            left: -30px;
            width: 100px;
            height: 100px;
            background-color: var(--color-green);
            border-radius: 50%;
            opacity: 0.15;
            z-index: 0;
        }

        /* Logo 圖片設定 */
        .logo-img {
            width: 110px; /* 可依您的 Logo 比例調整大小 */
            height: auto;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }

        header {
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 2.2rem;
            margin: 0 0 10px 0;
            color: var(--color-darkbrown);
            letter-spacing: 2px;
            font-weight: 700;
        }

        .subtitle {
            color: var(--color-milktea);
            font-size: 1.05rem;
            margin-bottom: 35px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        nav.menu {
            position: relative;
            z-index: 1;
        }

        /* 共用按鈕樣式 - 去除 Emoji，強調乾淨俐落 */
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            background-color: #FDFBF7;
            color: var(--color-darkbrown);
            text-decoration: none;
            font-size: 1.1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-sizing: border-box;
            border: 1px solid rgba(212, 163, 115, 0.3); /* 淡淡的奶茶色邊框 */
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(212, 163, 115, 0.2);
            background-color: #ffffff;
            border-color: var(--color-milktea);
        }

        /* 預約試教 - 溫暖橘立體設計 */
        .btn.highlight {
            background-color: var(--color-orange);
            color: #ffffff;
            font-weight: bold;
            border: none;
            box-shadow: 0 4px 10px rgba(226, 135, 67, 0.3);
        }

        .btn.highlight:hover {
            background-color: #cf7635; /* 稍微深一點的橘色 */
            box-shadow: 0 6px 15px rgba(226, 135, 67, 0.4);
        }

        /* LINE 諮詢 - 抹茶綠實心邊框設計 */
        .btn.line-btn {
            background-color: #ffffff;
            color: var(--color-green);
            font-weight: bold;
            border: 2px solid var(--color-green);
        }

        .btn.line-btn:hover {
            background-color: var(--color-green);
            color: #ffffff;
        }

        /* 底部返回按鈕 */
        footer {
            margin-top: 30px;
            position: relative;
            z-index: 1;
        }

        footer a {
            color: #b0a8a0;
            text-decoration: none;
            font-size: 0.9rem;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            transition: color 0.3s;
            border-bottom: 1px solid transparent;
        }

        footer a:hover {
            color: var(--color-darkbrown);
            border-bottom: 1px solid var(--color-darkbrown);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <!-- 這是您的 Logo 圖片位置 -->
            <img src="logo.png" alt="酥酥老師 Logo" class="logo-img">
            
            <h1>酥酥老師</h1>
            <div class="subtitle">用心陪伴 ‧ 用對方法 ‧ 看見進步的力量</div>
        </header>

        <nav class="menu">
            <a href="about.html" class="btn">師資簡介</a>
            
            <a href="https://script.google.com/macros/s/AKfycbxVdP8KQoiMbk96LmTLCPTzjxpyE_lglo1PVt9u4Ty7Nd5nzIAi9Na8OO1GvEzrfkOk/exec" target="_blank" class="btn">課表查詢</a>
            
            <a href="faq.html" class="btn">課程服務指南</a>
            
            <a href="https://instagram.com/crispyyyyy0121" target="_blank" class="btn">Instagram 教學日常</a>
            
            <a href="https://lin.ee/vdA03QOG" target="_blank" class="btn line-btn">☆★LINE 諮詢課程★☆</a>
        </nav>

        <footer>
    </div>
</body>
</html>
